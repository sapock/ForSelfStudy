name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Windows (x64) 빌드'
        type: boolean
        default: true
      build_mac:
        description: 'macOS (x64 + arm64) 빌드'
        type: boolean
        default: true
      build_linux:
        description: 'Linux AppImage (x64) 빌드'
        type: boolean
        default: true

defaults:
  run:
    working-directory: studia

jobs:
  build-windows:
    if: ${{ github.event_name == 'push' || inputs.build_windows }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: studia/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run electron:build:win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Studia-Windows-x64
          path: studia/release/*.zip

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: studia/release/*.zip

  build-mac:
    if: ${{ github.event_name == 'push' || inputs.build_mac }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: studia/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run electron:build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Studia-Mac
          path: studia/release/*.dmg

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: studia/release/*.dmg

  build-linux:
    if: ${{ github.event_name == 'push' || inputs.build_linux }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: studia/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run electron:build:linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Studia-Linux-x64
          path: studia/release/*.AppImage

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: studia/release/*.AppImage
